<div class="top-bar">
  <span>{{ menu.topBarTitle() }}</span>
</div>

@if (menu.modoOffline()) {
  <div class="offline-banner" title="Sem conexão com o Firestore — os pratos estão sendo salvos só neste dispositivo.">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.58 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
    Cardápio em modo offline — salvando apenas neste dispositivo
  </div>
}

<div class="orange-header">
  <div class="header-left">
    @if (menu.currentView() !== 'list') {
      <button class="back-btn" (click)="menu.goBackToList()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
    }
    <span class="brand-name">BOTECO DA ÁRVORE</span>
    <span class="header-sep">|</span>
    <span class="header-subtitle">{{ menu.headerSubtitle() }}</span>
  </div>
  <img src="assets/logo-boteco-da-arvore.jpg" class="logo-img" alt="Logo Boteco da Árvore"
       onerror="this.style.display='none'">
</div>
